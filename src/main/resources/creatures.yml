# creatures.yml — правила спавну/луту міфічних істот (полювання). Дають ЛИШЕ інгредієнти, ніколи Характеристики.
# Контент моба (стати, вигляд, скіли) живе у src/main/resources/mythic-pack/; id тут МАЄ збігатися
# з internal name MythicMobs-моба (join-ключ).
# Покриття: по одному створінню на (шлях × послідовність), лут = main-інгредієнти того тіру
# (auxiliary-трави/кристали приходять зі структур через global_loot.yml — тут не дублюються).
# tier: common (Seq 9-6, дика природа) | apex (Seq 5, біля структур, зрідка в дикій природі).
# Зменшений шанс дропу: min_items 0 / max_items 1 -> кіл часто дає 0, інколи 1 інгредієнт.
