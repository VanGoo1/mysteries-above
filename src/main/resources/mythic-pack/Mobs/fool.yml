# Летючий кастер: VEX-charge лишаємо (MA_Base не чистить AIGoalSelectors), кіт S5 — інлайном,
# БЕЗ rangedstance/float, інакше веекс дрейфує геть замість того, щоб битися.
fool_six_winged_gargoyle_5:
  Template: MA_Base
  Type: VEX
  Display: '&7Шестикрила Горгулья'
  Health: 150
  Damage: 11
  Options:
    MovementSpeed: 0.26
    Scale: 1.4
  Skills:
  - kitcast{gcd=80;skills=MA_Fool_S5_Marionette:240,MA_Fool_S7_AirBullet:160,MA_Fool_S8_PaperCutter:100} @NearestPlayer{r=12} ~onTimer:20
  - skill{s=MA_Fool_S5_Puppets} @self ~onDamaged ?healthpercent{h=<35}
  - skill{s=MA_Fool_S7_FlameJump} @NearestPlayer{r=3} ~onTimer:20 ?playerwithin{d=3}
  - skill{s=MA_Fool_S9_DangerIntuition} @trigger ~onDamaged
  - effect:particles{p=witch;amount=4;hS=0.3;vS=0.5;y=1} @self ~onTimer:20

MA_FoolPuppet:
  Type: ZOMBIE
  Display: '&8Лялька'
  Health: 8
  Options:
    PreventOtherDrops: true
    ShowNameOnDamaged: false
    PreventRandomEquipment: true
