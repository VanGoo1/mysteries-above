# Шаблони. MA_Base — спільні опції; MA_<Pathway>_S<seq> — кіт здібностей, накопичений
# з послідовностей 9..N (модель прогресії гравців). Наступальні касти йдуть через kitcast
# (ГКД ~6с, у S5 ~4с; вибір зважено-випадковий серед готових — перша у списку найважча);
# реактивні/пасивні — окремі тригерні рядки поза ГКД. Стійка: RANGED-шаблони вимикають рухові AI-цілі і додають rangedstance (стоїть-кастує
# в смузі 5..11, відходить кроком, мілі-відповідь по provoke) + provoke ~onDamaged; MELEE — нічого. Числа тут — баланс істот, незалежний від
# гравцевих здібностей.
MA_Base:
  # Плейсхолдер: шаблон ніколи не спавниться, але MythicMobs вантажить кожен запис Mobs/*.yml
  # як моба і без Type кидає "No Type specified". Конкретні моби перекривають Type власним.
  Type: ZOMBIE
  AITargetSelectors:
  - 0 clear
  - 1 attacker
  - 2 players
  Options:
    PreventOtherDrops: true
    MaxCombatDistance: 32
    Despawn: true

# ── Fool (RANGED з S8) ──
MA_Fool_S9:
  Template: MA_Base
  Skills:
  - skill{s=MA_Fool_S9_DangerIntuition} @trigger ~onDamaged
  - effect:particles{p=witch;amount=4;hS=0.3;vS=0.5;y=1} @self ~onTimer:20

MA_Fool_S8:
  Template: MA_Base
  AIGoalSelectors:
  - 0 clear
  - 1 float
  - 2 lookatplayers
  - 3 randomlookaround
  Skills:
  - kitcast{gcd=120;skills=MA_Fool_S8_PaperCutter:120} @NearestPlayer{r=12} ~onTimer:20
  - skill{s=MA_Fool_S9_DangerIntuition} @trigger ~onDamaged
  - potion{type=SPEED;duration=45;level=0;particles=false} @self ~onTimer:40
  - rangedstance{min=5;max=11} @NearestPlayer{r=24} ~onTimer:10
  - provoke{seconds=8} @self ~onDamaged ?playerwithin{d=3}
  - effect:particles{p=witch;amount=4;hS=0.3;vS=0.5;y=1} @self ~onTimer:20

MA_Fool_S7:
  Template: MA_Base
  AIGoalSelectors:
  - 0 clear
  - 1 float
  - 2 lookatplayers
  - 3 randomlookaround
  Skills:
  - kitcast{gcd=120;skills=MA_Fool_S7_AirBullet:200,MA_Fool_S8_PaperCutter:140} @NearestPlayer{r=12} ~onTimer:20
  - skill{s=MA_Fool_S7_FlameJump} @NearestPlayer{r=3} ~onTimer:20 ?playerwithin{d=3}
  - skill{s=MA_Fool_S9_DangerIntuition} @trigger ~onDamaged
  - potion{type=SPEED;duration=45;level=0;particles=false} @self ~onTimer:40
  - rangedstance{min=5;max=11} @NearestPlayer{r=24} ~onTimer:10
