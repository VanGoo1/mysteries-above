# Потойбічні істоти
creatures:
  # Мінімальна горизонтальна відстань (у блоках) від точки спавну світу, на якій починають
  # з'являтися міфічні істоти (природний спавн + спавн у структурах). /mm mobs spawn ігнорує це.
  min-spawn-distance: 2000
  # Ambient-спавн: істоти з'являються самі (нікого не заміняючи) біля потойбічного за межами
  # min-spawn-distance. Обираються серед усіх істот по біому; свій шлях+послідовність гравця —
  # вагово частіше (закон конвергенції як ухил, а не жорсткий фільтр).
  ambient:
    interval-seconds: 60   # як часто виконується перевірка
    chance: 0.022          # шанс спавну за перевірку на одного потойбічного (~1 / 45 хв)
    max-nearby: 3          # пропустити, якщо стільки тегованих істот уже в радіусі 64 блоків

# Закон Конвергенції: приховане тяжіння резонансних об'єктів (впалих Характеристик, решток,
# істот твого/сусіднього шляху) до найближчого кревного потойбічного. Гравців не рухає; єдиний
# прояв — вкрай рідкісний тихий ненапрямний звук.
convergence:
  interval-ticks: 200      # як часто тікає доля-поле (10 с)
  radius: 128              # радіус виявлення (блоки)
  item-drift-speed: 0.08   # базовий горизонтальний velocity-нудж есенції-предмета
  mob-nudge-chance: 0.5    # базова P(pathfind до магніта) при strength = 1
  whisper-chance: 0.03     # рідкісний тихий ненапрямний звук притягнутому Beyonder'у
