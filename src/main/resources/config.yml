# Потойбічні істоти
creatures:
  # Мінімальна горизонтальна відстань (у блоках) від точки спавну світу, на якій починають
  # з'являтися міфічні істоти (природний спавн + спавн у структурах). /mm mobs spawn ігнорує це.
  min-spawn-distance: 2000
  # Ambient-спавн: істоти з'являються самі (нікого не заміняючи) біля потойбічного за межами
  # min-spawn-distance. Обираються серед усіх істот по біому; свій шлях+послідовність гравця —
  # вагово частіше (закон конвергенції як ухил, а не жорсткий фільтр).
  ambient:
    interval-seconds: 60   # як часто виконується перевірка
    chance: 0.022          # шанс спавну за перевірку на одного потойбічного (~1 / 45 хв)
    max-nearby: 3          # пропустити, якщо стільки тегованих істот уже в радіусі 64 блоків

# Підпільний ринок (Збори Потойбічних)
market:
  gathering:
    interval-days: 7          # реальних днів між зборами (відлік персиститься)
    join-window-minutes: 5    # вікно згоди після оголошення
    duration-minutes: 15      # тривалість відкритого ринку
  commission-rate: 0.10       # комісія організатора з угод гравець-гравець (згорає)
  # на нерівних (не круглих) ставках PoundMoney.commission (ceil(коппети×ставка))
  # через похибку double може округлити на 1 коппет більше; 0.10 за замовчуванням безпечна

  buyback:                    # скупка організатором (коппети за одиницю; джерело емісії)
    # Усі категорії скейляться від послідовності (9 = найслабша ... 0 = найсильніша).
    ingredient-coppets: 2     # фолбек для інгредієнта БЕЗ послідовності (не входить у жоден рецепт)
    ingredient-coppets-by-seq:  # ціна інгредієнта = за найсильнішим (найнижчим) рецептом, де він ужитий
      "9": 3
      "8": 5
      "7": 8
      "6": 13
      "5": 20
      "4": 32
      "3": 50
      "2": 75
      "1": 105
      "0": 140
    recipe-book-coppets-by-seq:  # рецепт розблоковує просування — рідкісний, дорогий; росте з послідовністю
      "9": 120
      "8": 170
      "7": 240
      "6": 330
      "5": 450
      "4": 600
      "3": 780
      "2": 980
      "1": 1200
      "0": 1500
    characteristic-coppets-by-seq:
      "9": 80
      "8": 130
      "7": 220
      "6": 360
      "5": 540
      "4": 780     # нижчі послідовності — сильніші, дорожча скупка
      "3": 1100
      "2": 1500
      "1": 2000
      "0": 2600
    overrides: {}             # точкові ціни (перекривають скейл): "custom:<id>": коппети

# Закон Конвергенції: приховане тяжіння резонансних об'єктів (впалих Характеристик, решток,
# істот твого/сусіднього шляху) до найближчого кревного потойбічного. Гравців не рухає; єдиний
# прояв — вкрай рідкісний тихий ненапрямний звук.
convergence:
  interval-ticks: 200      # як часто тікає доля-поле (10 с)
  radius: 128              # радіус виявлення (блоки)
  item-drift-speed: 0.08   # базовий горизонтальний velocity-нудж есенції-предмета
  mob-nudge-chance: 0.5    # базова P(pathfind до магніта) при strength = 1
  whisper-chance: 0.03     # рідкісний тихий ненапрямний звук притягнутому Beyonder'у
