# Потойбічні істоти
creatures:
  # Мінімальна горизонтальна відстань (у блоках) від точки спавну світу, на якій починають
  # з'являтися міфічні істоти (природний спавн + спавн у структурах). /mm mobs spawn ігнорує це.
  min-spawn-distance: 2000
  # Ambient-спавн: істоти з'являються самі (нікого не заміняючи) біля потойбічного за межами
  # min-spawn-distance, за законом конвергенції (його шлях+послідовність).
  ambient:
    interval-seconds: 60   # як часто виконується перевірка
    chance: 0.022          # шанс спавну за перевірку на одного потойбічного (~1 / 45 хв)
    max-nearby: 3          # пропустити, якщо стільки тегованих істот уже в радіусі 64 блоків

# Підпільний ринок (Збори Потойбічних)
market:
  gathering:
    interval-days: 7          # реальних днів між зборами (відлік персиститься)
    join-window-minutes: 5    # вікно згоди після оголошення
    duration-minutes: 15      # тривалість відкритого ринку
  commission-rate: 0.10       # комісія організатора з угод гравець-гравець (згорає)
  # на нерівних (не круглих) ставках PoundMoney.commission (ceil(коппети×ставка))
  # через похибку double може округлити на 1 коппет більше; 0.10 за замовчуванням безпечна

  buyback:                    # скупка організатором (коппети за одиницю; джерело емісії)
    ingredient-coppets: 2
    recipe-book-coppets: 200  # рецепт розблоковує просування — рідкісний, високий викуп
    characteristic-coppets-by-seq:
      "9": 80
      "8": 130
      "7": 220
      "6": 360
      "5": 540
    overrides: {}             # точкові ціни: "custom:<id>": коппети
