# forage.yml
# Природний форедж допоміжних інгредієнтів: на вегетації біля гравця з'являється видима 3D-нода
# допоміжного інгредієнта; блок підмінюється на «зачарованого» донора; ламаєш -> падає лише
# інгредієнт. Лише наявні auxiliary з potion-recipes.yml. Біом-тематично, для всіх гравців.
forage:
  spawn:
    interval-seconds: 40      # як часто планувальник перевіряє гравців
    chance: 0.25              # шанс спробувати спавн ноди за тік на гравця
    max-nearby: 3             # не спавнити, якщо стільки нод вже в радіусі 32 блоки
    ttl-seconds: 90           # нода зникає, якщо її не зібрали
    search-radius: 8          # радіус пошуку вегетації біля гравця (на рівні ніг)
    particle-period-ticks: 40 # період тихих GLOW-частинок над зачарованими блоками
    leaves:                   # цілі в кронах (повні блоки листя)
      - OAK_LEAVES
      - BIRCH_LEAVES
      - SPRUCE_LEAVES
      - DARK_OAK_LEAVES
      - JUNGLE_LEAVES
      - ACACIA_LEAVES
    vegetation:               # на чому з'являються ноди (НАЗЕМНА флора, без листя крон)
      - SHORT_GRASS
      - TALL_GRASS
      - FERN
      - LARGE_FERN
      - SWEET_BERRY_BUSH
      - DANDELION
      - POPPY
      - CORNFLOWER
      - OXEYE_DAISY
      - BLUE_ORCHID
      - AZURE_BLUET
      - ALLIUM
      - RED_TULIP
      - LILY_OF_THE_VALLEY
  donors:                     # оригінал -> блок-донор; ресурспак малює донора «зачарованим»
    default-plant: WARPED_ROOTS
    default-leaves: AZALEA_LEAVES
    overrides:
      POPPY: CRIMSON_ROOTS
      DANDELION: CRIMSON_ROOTS
      CORNFLOWER: CRIMSON_ROOTS
      OXEYE_DAISY: CRIMSON_ROOTS
      BLUE_ORCHID: CRIMSON_ROOTS
      AZURE_BLUET: CRIMSON_ROOTS
      ALLIUM: CRIMSON_ROOTS
      RED_TULIP: CRIMSON_ROOTS
      LILY_OF_THE_VALLEY: CRIMSON_ROOTS
      SWEET_BERRY_BUSH: NETHER_SPROUTS
  biomes:                     # біом -> зважена таблиця допоміжних id (усі — наявні auxiliary)
    PLAINS:
      - { id: elf_flower_petals, weight: 50 }
      - { id: autumn_crocus_essence, weight: 30 }
      - { id: bone_of_the_unyielding_frame, weight: 15 }
      - { id: star_crystal, weight: 25 }
    SUNFLOWER_PLAINS:
      - { id: elf_flower_petals, weight: 50 }
      - { id: peppermint_extract, weight: 30 }
      - { id: black_rimmed_sunflower_powder, weight: 20 }
    MEADOW:
      - { id: memory_flower_petals, weight: 40 }
      - { id: crystalline_moon_orchid, weight: 25 }
      - { id: golden_cloak_grass_powder, weight: 20 }
    FOREST:
      - { id: red_chestnut_flower, weight: 40 }
      - { id: memory_flower_petals, weight: 40 }
      - { id: droplet_gem_powder, weight: 20 }
    FLOWER_FOREST:
      - { id: memory_flower_petals, weight: 50 }
      - { id: peppermint_extract, weight: 30 }
      - { id: crystalline_moon_orchid, weight: 20 }
      - { id: fantasy_grass_oil, weight: 20 }
    BIRCH_FOREST:
      - { id: tree_of_wisdom_sap, weight: 40 }
      - { id: yellow_amber_powder, weight: 30 }
    DARK_FOREST:
      - { id: memory_flower_petals, weight: 40 }
      - { id: crystalline_moon_orchid, weight: 25 }
      - { id: human_faced_rose_stalk, weight: 25 }
    JUNGLE:
      - { id: ever_shifting_lotus, weight: 40 }
      - { id: tree_of_elders_fruit, weight: 30 }
      - { id: dragon_blood_grass_powder, weight: 20 }
    TAIGA:
      - { id: tree_of_elders_fruit, weight: 40 }
      - { id: string_grass_powder, weight: 30 }
    SWAMP:
      - { id: dust_of_lake_spirit, weight: 50 }
